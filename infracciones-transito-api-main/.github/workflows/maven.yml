name: Java CI with Maven and MySQL

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: infracciones_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Create .env file for tests
      run: |
        echo "BD_URL=jdbc:mysql://127.0.0.1:3306/infracciones_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC" > .env
        echo "BD_USERNAME=root" >> .env
        echo "BD_PASSWORD=root" >> .env

    - name: Build with Maven
      run: mvn -B test --file pom.xml
